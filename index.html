<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>our memories ♡</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Quicksand:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-1: #fff7fb;
        --bg-2: #fff2f7;
        --bg-3: #fffbfe;
        --card: rgba(255, 250, 253, 0.95);
        --card-solid: #fffafd;
        --header: #f6d6e2;
        --header-strong: #efc6d8;
        --border: #f1dde8;
        --border-2: #f4c7d4;
        --text: #6b4b57;
        --text-soft: #8e6d7b;
        --shadow: 0 14px 30px rgba(246, 214, 226, 0.28);
        --shadow-strong: 0 20px 40px rgba(246, 214, 226, 0.34);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: 'Quicksand', sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 20% 15%, rgba(246, 214, 226, 0.45), transparent 16%),
          radial-gradient(circle at 80% 12%, rgba(241, 221, 232, 0.35), transparent 18%),
          radial-gradient(circle at 50% 55%, rgba(255, 255, 255, 0.65), transparent 26%),
          radial-gradient(circle at 18% 78%, rgba(241, 221, 232, 0.30), transparent 16%),
          radial-gradient(circle at 84% 82%, rgba(246, 214, 226, 0.35), transparent 18%),
          linear-gradient(180deg, var(--bg-1), var(--bg-2), var(--bg-3));
      }

      body {
        overflow-x: hidden;
      }

      .page {
        position: relative;
        min-height: 100vh;
        padding: 32px;
      }

      .floating-decor {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }

      .decor {
        position: absolute;
        opacity: 0.7;
        color: #dcb9ca;
        filter: drop-shadow(0 6px 10px rgba(255, 255, 255, 0.7));
        animation: float 6s ease-in-out infinite;
        user-select: none;
      }

      .toolbar,
      .post,
      .widget,
      .popup {
        backdrop-filter: blur(8px);
      }

      .toolbar {
        position: relative;
        z-index: 2;
        max-width: 1280px;
        margin: 0 auto 32px;
        background: rgba(255, 247, 248, 0.95);
        border: 1px solid var(--border-2);
        border-radius: 32px;
        box-shadow: 0 16px 34px rgba(246, 214, 226, 0.26);
        padding: 16px 24px;
        transition: box-shadow 0.3s ease, transform 0.3s ease;
      }

      .toolbar:hover {
        box-shadow: 0 20px 40px rgba(246, 214, 226, 0.32);
      }

      .toolbar-inner {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 24px;
      }

      .brand,
      .toolbar-actions {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .brand {
        justify-self: start;
      }

      .toolbar-actions {
        justify-self: end;
      }

      .brand-icons {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 15px;
      }

      .site-title,
      h1,
      h2,
      h3,
      .post-header,
      .quote-pill {
        font-family: 'Fredoka', sans-serif;
      }

      .site-title {
        font-size: 1.1rem;
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      .quote-pill {
        justify-self: center;
        padding: 8px 16px;
        border-radius: 999px;
        background: var(--bg-2);
        box-shadow: 0 4px 10px rgba(223, 202, 221, 0.16);
        font-size: 0.95rem;
        transition: transform 0.35s ease;
      }

      .quote-pill:hover {
        transform: scale(1.03);
      }

      .soft-btn {
        border: 1px solid var(--border-2);
        background: #ffffff;
        color: var(--text);
        border-radius: 16px;
        padding: 10px 18px;
        font-family: 'Quicksand', sans-serif;
        font-weight: 600;
        box-shadow: 0 8px 18px rgba(246, 214, 226, 0.22);
        cursor: pointer;
        transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
      }

      .soft-btn:hover {
        transform: translateY(-2px) scale(1.03);
        background: var(--card-solid);
        box-shadow: 0 12px 22px rgba(246, 214, 226, 0.28);
      }

      .layout {
        position: relative;
        z-index: 2;
        max-width: 1280px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 240px minmax(0, 1fr) 240px;
        gap: 32px;
        align-items: start;
      }

      .widget-zone {
        position: relative;
        min-height: 980px;
      }

      .widget {
        position: absolute;
        width: 240px;
        border: 1px solid var(--border);
        background: rgba(255, 250, 253, 0.96);
        border-radius: 24px;
        overflow: hidden;
        box-shadow: var(--shadow);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        user-select: none;
      }

      .widget:hover {
        transform: translateY(-4px) scale(1.01);
        box-shadow: var(--shadow-strong);
      }

      .widget-zone,
      .widget,
      .widget-bar {
        -webkit-user-select: none;
        user-select: none;
      }

      body.dragging-widget {
        -webkit-user-select: none;
        user-select: none;
        cursor: grabbing;
      }

      .widget-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--header);
        color: #7a6470;
        padding: 10px 14px;
        font-size: 0.74rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        cursor: grab;
      }

      .widget-bar:active {
        cursor: grabbing;
      }

      .widget-content {
        padding: 16px;
      }

      #widgetPopup .popup-card {
        max-width: 520px;
      }

      #widgetEditorFields {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      #widgetPopup .popup-body {
        padding: 20px;
      }

      #widgetPopup .popup-title {
        font-size: 1.05rem;
      }

      #widgetPopup .popup-input {
        background: rgba(255, 255, 255, 0.9);
      }

      #widgetPopup textarea.popup-input {
        min-height: 110px;
      }

      #widgetPopup .popup-actions {
        margin-top: 18px;
      }

      .widget-edit-btn {
        border: none;
        background: transparent;
        color: #7a6470;
        font-size: 0.9rem;
        opacity: 0.75;
        cursor: pointer;
        transition: all 0.2s ease;
        padding: 0;
        font-family: inherit;
      }

      .widget-edit-btn:hover {
        transform: scale(1.1);
        opacity: 1;
      }

      .widget.dragging {
        transform: none !important;
        transition: none !important;
      }

      .timeline {
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .post {
        overflow: hidden;
        position: relative;
        border: 1px solid var(--border);
        border-radius: 26px;
        background: var(--card-solid);
        box-shadow: var(--shadow);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }

      .post:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow-strong);
      }

      .post-header {
        background: var(--header);
        padding: 12px 18px;
        font-size: 0.95rem;
      }

      .post-body {
        position: relative;
        background: var(--card-solid);
        padding: 24px;
        min-height: 190px;
      }

      .post-meta {
        margin-bottom: 14px;
        font-size: 0.92rem;
        color: var(--text-soft);
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .post-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        object-fit: cover;
        border: 1px solid var(--border-2);
        background: #fff;
        box-shadow: 0 6px 14px rgba(246, 214, 226, 0.2);
      }

      .post-author-text {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .post-author-name {
        font-weight: 700;
        color: var(--text);
      }

      .post-text {
        margin: 0;
        font-size: 1rem;
        line-height: 1.95;
      }

      .post-actions {
        display: flex;
        gap: 12px;
        margin-top: 20px;
      }

      .post-btn {
        border: 1px solid var(--border-2);
        background: var(--bg-2);
        color: var(--text);
        border-radius: 16px;
        padding: 10px 16px;
        font-family: 'Quicksand', sans-serif;
        font-weight: 600;
        box-shadow: 0 8px 18px rgba(246, 214, 226, 0.2);
        cursor: pointer;
        transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
      }

      .reply-btn,
      .delete-comment-btn,
      .delete-reply-btn {
        border: 1px solid var(--border-2);
        background: #ffeaf3;
        color: var(--text);
        border-radius: 10px;
        padding: 4px 8px;
        font-family: 'Quicksand', sans-serif;
        font-weight: 600;
        font-size: 0.76rem;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .reply-btn:hover,
      .delete-comment-btn:hover,
      .delete-reply-btn:hover {
        transform: translateY(-1px);
        opacity: 0.85;
        background: #ffeaf3;
      }

      .delete-wish-btn {
        border: 1px solid var(--border-2);
        background: #ffeaf3;
        color: var(--text);
        border-radius: 10px;
        padding: 5px 10px;
        font-family: 'Quicksand', sans-serif;
        font-weight: 600;
        font-size: 0.76rem;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .delete-wish-btn:hover {
        transform: translateY(-1px);
        opacity: 0.85;
      }

      .post-btn:hover {
        transform: translateY(-2px) scale(1.03);
        background: #ffeaf3;
        box-shadow: 0 12px 24px rgba(246, 214, 226, 0.26);
      }

      .reaction-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .reaction-sticker {
        position: absolute;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
        line-height: 1;
        pointer-events: auto;
        filter: drop-shadow(0 6px 10px rgba(246, 214, 226, 0.35));
        transform: translate(-50%, -50%);
        transition: transform 0.2s ease;
      }

      .reaction-sticker:hover {
        transform: translate(-50%, -50%) scale(1.08);
      }

      .reaction-sticker-emoji {
        cursor: grab;
      }

      .sticker-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 48px;
        height: 48px;
        border: 1px solid var(--border-2);
        border-radius: 16px;
        background: #fff;
        box-shadow: 0 8px 16px rgba(246, 214, 226, 0.18);
        cursor: grab;
        transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
        -webkit-user-drag: element;
        user-select: none;
      }

      .sticker-pill:hover {
        transform: translateY(-2px) scale(1.06);
        box-shadow: 0 14px 22px rgba(246, 214, 226, 0.25);
        background: #fffafd;
      }

      .post-body.sticker-drop-ready {
        outline: 2px dashed rgba(244, 199, 212, 0.95);
        outline-offset: -8px;
      }

      .sticker-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .sticker-grid-item {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .sticker-delete-btn,
      .sticker-undo-btn,
      .comment-like-btn {
        border: 1px solid var(--border-2);
        background: #ffeaf3;
        color: var(--text);
        border-radius: 10px;
        padding: 4px 8px;
        font-family: 'Quicksand', sans-serif;
        font-weight: 600;
        font-size: 0.76rem;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .sticker-delete-btn:hover,
      .comment-like-btn:hover {
        transform: translateY(-1px);
        opacity: 0.85;
      }

      .sticker-undo-btn {
        position: absolute;
        top: 50%;
        left: 100%;
        transform: translate(6px, -50%);
        font-size: 0.7rem;
        line-height: 1;
        padding: 4px 7px;
      }

      .sticker-undo-btn:hover {
        transform: translate(6px, calc(-50% - 1px));
        opacity: 0.85;
      }

      .popup {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(255, 244, 248, 0.45);
        z-index: 20;
      }

      .popup.open {
        display: flex;
      }

      .popup-card {
        width: 100%;
        max-width: 420px;
        background: rgba(255, 250, 253, 0.98);
        border: 1px solid var(--border-2);
        border-radius: 28px;
        box-shadow: var(--shadow-strong);
        overflow: hidden;
        animation: softFade 0.3s ease;
      }

      .popup-header {
        background: var(--header);
        padding: 14px 18px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .popup-title {
        margin: 0;
        font-size: 1rem;
      }

      .popup-body {
        padding: 18px;
      }

      .popup-label {
        display: block;
        font-size: 0.92rem;
        margin-bottom: 8px;
      }

      .popup-input {
        width: 100%;
        padding: 12px 14px;
        border-radius: 16px;
        border: 1px solid var(--border-2);
        background: #fff;
        font-family: 'Quicksand', sans-serif;
        font-size: 1rem;
        color: var(--text);
        outline: none;
      }

      .popup-input:focus {
        box-shadow: 0 0 0 4px rgba(246, 214, 226, 0.2);
      }

      .popup-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 16px;
      }

      .small-note {
        margin-top: 12px;
        color: var(--text-soft);
        font-size: 0.88rem;
      }

      .comment-name {
        font-weight: 700;
        margin-bottom: 4px;
        color: var(--text);
      }

      .comment-meta {
        font-size: 0.82rem;
        color: var(--text-soft);
        margin-bottom: 6px;
      }

      .comment-empty {
        color: var(--text-soft);
        font-size: 0.95rem;
      }

      .delete-date-btn {
        border: 1px solid var(--border-2);
        background: #ffeaf3;
        color: var(--text);
        border-radius: 10px;
        padding: 5px 10px;
        font-family: 'Quicksand', sans-serif;
        font-weight: 600;
        font-size: 0.76rem;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .delete-date-btn:hover {
        transform: translateY(-1px);
        opacity: 0.85;
      }

      .post-btn:active,
      .reply-btn:active,
      .delete-comment-btn:active,
      .delete-reply-btn:active {
        transform: scale(0.95);
      }

      .comment-actions {
        margin-top: 8px;
        display: flex;
        gap: 6px;
        justify-content: flex-end;
      }

      .comment-reply {
        margin-top: 10px;
        margin-left: 18px;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: rgba(255, 247, 251, 0.9);
        animation: softFadeUp 0.35s ease;
      }

      .comment-reply .comment-actions {
        margin-top: 6px;
        display: flex;
        justify-content: flex-end;
      }

      .message {
        position: fixed;
        top: 18px;
        right: 18px;
        z-index: 30;
        padding: 12px 16px;
        border-radius: 18px;
        background: rgba(255, 250, 253, 0.98);
        border: 1px solid var(--border-2);
        box-shadow: 0 14px 26px rgba(246, 214, 226, 0.28);
        display: none;
        font-family: 'Fredoka', sans-serif;
        color: var(--text);
      }

      .message.show {
        display: block;
        animation: bubblePop 0.25s ease;
      }

      .post {
        animation: postFadeIn 0.45s ease;
      }

      .comment-item {
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: rgba(255, 250, 253, 0.95);
        box-shadow: 0 6px 14px rgba(246, 214, 226, 0.14);
        display: flex;
        flex-direction: column;
        align-items: stretch;
        animation: softFadeUp 0.4s ease;
      }

      @keyframes postFadeIn {
        0% {
          opacity: 0;
         transform: translateY(14px);
         }
          100% {
          opacity: 1;
         transform: translateY(0);
        }
      }

      @keyframes commentFadeIn {
        0% {
          opacity: 0;
         transform: translateY(8px);
          }
         100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes bubblePop {
        0% {
          transform: scale(0.9);
          opacity: 0;
        }
        100% {
        transform: scale(1);
        opacity: 1;
        }
      }

      @keyframes softFadeUp {
        0% {
          opacity: 0;
          transform: translateY(12px) scale(0.98);
          }
          100% {
         opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes softFade {
          0% {
         opacity: 0;
          }
          100% {
          opacity: 1;
        }
      }

      @media (max-width: 1180px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .widget-zone {
          min-height: 280px;
        }

        .widget {
          position: relative;
          inset: auto !important;
          width: 100%;
          margin-bottom: 16px;
        }
      }

    </style>
  </head>
  <body>
    <div class="page">
      <div class="floating-decor" id="floatingDecor"></div>

      <header class="toolbar">
        <div class="toolbar-inner">
          <div class="brand">
            <div class="brand-icons"><span>🎀</span><span>✦</span><span>♡</span></div>
            <div class="site-title">our memories ♡</div>
          </div>

          <div class="quote-pill">⊹₊˚‧︵‿₊୨forever and always୧₊‿︵‧˚₊⊹</div>

          <div class="toolbar-actions">
            <button class="soft-btn" type="button" id="newEntryBtn">new entry</button>
            <button class="soft-btn" type="button" id="profileBtn">profile</button>
          </div>
        </div>
      </header>

      <main class="layout">
        <section class="widget-zone" id="leftZone"></section>

        <section class="timeline" id="timeline"></section>

        <section class="widget-zone" id="rightZone"></section>
      </main>
    </div>

    <div class="message" id="messageBox"></div>

    <div class="popup" id="profilePopup">
      <div class="popup-card">
        <div class="popup-header">
          <h3 class="popup-title">my profile ♡</h3>
          <button class="soft-btn" id="closeProfilePopup" type="button">close</button>
        </div>
        <div class="popup-body">
          <label class="popup-label">nickname</label>
          <input class="popup-input" id="nicknameInput" type="text" />
    
          <label class="popup-label" style="margin-top: 12px;">profile picture</label>
          <input class="popup-input" id="pfpInput" type="file" accept="image/*" />
    
          <div class="popup-actions">
            <button class="soft-btn" id="logoutBtn" type="button">log out</button>
            <button class="soft-btn" id="saveProfileBtn" type="button">save</button>
          </div>
        </div>
      </div>
    </div>

    <div class="popup" id="entryPopup">
      <div class="popup-card">
        <div class="popup-header">
          <h3 class="popup-title">new entry ♡</h3>
          <button class="soft-btn" id="closeEntryPopup" type="button">close</button>
        </div>
        <div class="popup-body">
          <label class="popup-label">write something ♡</label>
          <textarea
            class="popup-input"
            id="entryContentInput"
            rows="6"
            style="resize: vertical; min-height: 140px;"
          ></textarea>
    
          <div class="popup-actions">
            <button class="soft-btn" id="saveEntryBtn" type="button">post</button>
          </div>
        </div>
      </div>
    </div>

    <div class="popup" id="commentsPopup">
      <div class="popup-card">
        <div class="popup-header">
          <h3 class="popup-title">comments ♡</h3>
          <button class="soft-btn" id="closeCommentsPopup" type="button">close</button>
        </div>
        <div class="popup-body">
          <div id="commentsList" style="display:flex; flex-direction:column; gap:12px; max-height:260px; overflow:auto; margin-bottom:16px;"></div>
    
          <div id="replyingToLabel" class="small-note" style="display:none;"></div>
          <label class="popup-label">leave a smol note?</label>
          <textarea
            class="popup-input"
            id="commentInput"
            rows="4"
            style="resize: vertical; min-height: 96px;"
          ></textarea>
    
          <div class="popup-actions">
            <button class="soft-btn" id="saveCommentBtn" type="button">post comment</button>
          </div>
        </div>
      </div>
    </div>



    <div class="popup" id="widgetPopup">
      <div class="popup-card">
        <div class="popup-header">
          <h3 class="popup-title" id="widgetPopupTitle">edit widget</h3>
          <button class="soft-btn" id="closeWidgetPopup" type="button">close</button>
        </div>
        <div class="popup-body">
          <div id="widgetEditorFields"></div>
          <div class="popup-actions">
            <button class="soft-btn" id="saveWidgetBtn" type="button">save</button>
          </div>
        </div>
      </div>
    </div>

    <div class="popup" id="stickerPopup">
      <div class="popup-card">
        <div class="popup-header">
          <h3 class="popup-title">. ݁₊ ⊹ . ݁ sticker box ݁ . ⊹ ₊ ݁.</h3>
          <button class="soft-btn" id="closeStickerPopup">close</button>
        </div>
        <div class="popup-body">
          <label class="popup-label" for="stickerInput">add a little sticker ♡</label>
          <input class="popup-input" id="stickerInput" maxlength="4" placeholder="" />
          <div class="popup-actions">
            <button class="soft-btn" id="saveStickerBtn">save</button>
          </div>
          <div class="small-note">you can drag your stickers from the sticker box onto any diary entry ♡</div>
        </div>
      </div>

if (isNoteWidget) {

  if (isDatesWidget) {
  const items = widget.data?.items || [];

  if (!items.length) {
    return `<div style="font-size:0.92rem;opacity:0.75;">no important dates yet ♡</div>`;
  }

  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const sortedItems = [...items].sort((a, b) => {
    const aDate = new Date(a.date);
    const bDate = new Date(b.date);

    aDate.setHours(0, 0, 0, 0);
    bDate.setHours(0, 0, 0, 0);

    const aDiff = Math.ceil((aDate - today) / (1000 * 60 * 60 * 24));
    const bDiff = Math.ceil((bDate - today) / (1000 * 60 * 60 * 24));

    const aIsUpcoming = aDiff >= 0;
    const bIsUpcoming = bDiff >= 0;

    if (aIsUpcoming && !bIsUpcoming) return -1;
    if (!aIsUpcoming && bIsUpcoming) return 1;

    if (aIsUpcoming && bIsUpcoming) return aDiff - bDiff;

    return Math.abs(aDiff) - Math.abs(bDiff);
  });

  const html = sortedItems.map((item) => {
    const target = new Date(item.date);
    target.setHours(0, 0, 0, 0);

    const diffMs = target - today;
    const diffDays = Math.ceil(diffMs / (1000 * 60 * 60 * 24));

    let countdownText = '';
    if (diffDays > 0) {
      countdownText = `${diffDays} days left`;
    } else if (diffDays === 0) {
      countdownText = 'today ♡';
    } else {
      countdownText = `${Math.abs(diffDays)} days ago`;
    }

    return `
      <div style="padding:8px 0;border-bottom:1px solid rgba(241,221,232,0.7);">
        <div style="font-size:0.95rem;font-weight:700;">${item.title}</div>
        <div style="margin-top:4px;font-size:0.82rem;opacity:0.75;">${countdownText}</div>
      </div>

  }).join('');

    return;
  }

  if (data && data.length) {

        title: savedWidget.title ?? defaultWidget.title,
        side: savedWidget.side ?? defaultWidget.side,

        y: savedWidget.y ?? defaultWidget.y,
        data: savedWidget.data ?? defaultWidget.data,

async function saveWidgetToSupabase(widget) {
  const { error } = await supabaseClient
    .from('widgets')
    .upsert({
      id: widget.id,
      title: widget.title,
      side: widget.side,
      x: widget.x,
      y: widget.y,
      data: widget.data || null,
      content: widget.content || null,
      updated_at: new Date().toISOString()
    });

  if (error) {
    console.error(error);
    showMessage(error.message);
  }
}

  function formatEntryDate(dateString) {

    year: 'numeric',
    hour: 'numeric',
    minute: '2-digit'
  });
}

      async function handleStickerDrop(event, postId) {
        event.preventDefault();

        let droppedSticker = activeSticker;

        if (!droppedSticker && event.dataTransfer) {
          droppedSticker = event.dataTransfer.getData('text/plain');
        }

        if (!droppedSticker) {
          showMessage('no sticker selected ♡');
          return;
        }

        const user = await getCurrentUser();

        if (!user) {
          showMessage('please log in first ♡');
          return;
        }

        const body =
          getDropBodyFromTarget(event.currentTarget) ||
          getDropBodyFromTarget(event.target);

        if (!body) {
          showMessage('could not find the post area ♡');
          return;
        }

        body.classList.remove('sticker-drop-ready');
        const rect = body.getBoundingClientRect();
        const stickerRadius = 16;
        const x = Math.round(
          Math.max(stickerRadius, Math.min(rect.width - stickerRadius, event.clientX - rect.left))
        );
        const y = Math.round(
          Math.max(stickerRadius, Math.min(rect.height - stickerRadius, event.clientY - rect.top))
        );

        const { error } = await supabaseClient
          .from('post_stickers')
          .insert({
            post_id: postId,
            user_id: user.id,
            emoji: droppedSticker,
            x,
            y
          });

        if (error) {
          console.error('POST STICKER INSERT ERROR:', error);
          showMessage(error.message);
          return;
        }

        activeSticker = null;
        document.body.classList.remove('sticker-dragging');
        showMessage('sticker placed ♡');
        await loadPlacedStickers();
      }

function startWidgetDrag(event, widget, element) {
  const zone = widget.side === 'left' ? leftZone : rightZone;

  pendingWidgetDrag = {
    widget,
    element,
    zone,
    startX: event.clientX,
    startY: event.clientY,
    originX: widget.x,
    originY: widget.y,
    pointerId: event.pointerId
  };
}

window.addEventListener('pointermove', (event) => {
  if (!dragWidget && pendingWidgetDrag) {
    const dx = event.clientX - pendingWidgetDrag.startX;
    const dy = event.clientY - pendingWidgetDrag.startY;
    const distance = Math.hypot(dx, dy);

    if (distance > 6) {
  dragWidget = { ...pendingWidgetDrag };
  dragWidget.element.classList.add('dragging');
  document.body.classList.add('dragging-widget');
  pendingWidgetDrag = null;
}
  }

  if (!dragWidget) return;

  const { widget, zone, startX, startY, originX, originY } = dragWidget;
  const zoneRect = zone.getBoundingClientRect();
  const nextX = originX + (event.clientX - startX);
  const nextY = originY + (event.clientY - startY);

  widget.x = Math.max(-24, Math.min(zoneRect.width - 160, nextX));
  widget.y = Math.max(0, Math.min(zoneRect.height - 100, nextY));

  dragWidget.element.style.left = widget.x + 'px';
  dragWidget.element.style.top = widget.y + 'px';
});

window.addEventListener('pointerup', async () => {
  const finishedDrag = dragWidget;

  if (dragWidget?.element) {
    dragWidget.element.classList.remove('dragging');
  }

  document.body.classList.remove('dragging-widget');

  dragWidget = null;
  pendingWidgetDrag = null;

  if (finishedDrag) {
    await saveWidgetToSupabase(finishedDrag.widget);
  }
});

async function ensureProfile(user, fallbackNickname = '') {

    .from('profiles')
    .select('*')
    .eq('id', user.id)
    .maybeSingle();

  if (selectError) {
    console.error(selectError);
    return null;
  }

  if (existing) return existing;

  const usernameBase = user.email
    ? user.email.split('@')[0]
    : `user-${user.id.slice(0, 6)}`;

  const { data: created, error: insertError } = await supabaseClient
    .from('profiles')
    .insert({
      id: user.id,
      username: usernameBase,
      nickname: fallbackNickname || usernameBase,
      avatar_url: null
    })
    .select()
    .single();

  if (insertError) {
    console.error(insertError);
    return null;
  }

  return created;
}

async function loadPlacedStickers() {
  const { data, error } = await supabaseClient
    .from('post_stickers')
    .select('id, post_id, user_id, emoji, x, y');

  if (error) {
    console.error(error);
    showMessage(error.message);
    return;
  }

  const stickerRows = data || [];
  const seenStickerKeys = new Map();
  const duplicateStickerIds = [];

  stickerRows.forEach((row) => {
    const key = [row.post_id, row.user_id, row.emoji, row.x, row.y].join('::');

    if (seenStickerKeys.has(key)) {
      duplicateStickerIds.push(row.id);
      return;
    }

    seenStickerKeys.set(key, row.id);
  });

  if (duplicateStickerIds.length) {
    const { error: cleanupError } = await supabaseClient
      .from('post_stickers')
      .delete()
      .in('id', duplicateStickerIds);

    if (cleanupError) {
      console.error(cleanupError);
      showMessage(cleanupError.message);
      return;
    }
  }

  const uniqueStickerRows = stickerRows.filter(
    (row) => !duplicateStickerIds.includes(row.id)
  );

  placedStickers = uniqueStickerRows.map((row) => ({
    id: row.id,
    postId: row.post_id,
    userId: row.user_id,
    sticker: row.emoji,
    x: row.x,
    y: row.y
  }));

  renderPlacedStickers();

  if (duplicateStickerIds.length) {
    showMessage('cleaned up duplicate stickers ♡');
  }
}

async function saveProfile() {

  const nickname = nicknameInput.value.trim();
  const file = pfpInput.files[0];

  const user = await getCurrentUser();

  if (!user) {
    showMessage('please log in first ♡');
    return;
  }

  let avatarUrl = currentProfile?.avatar_url || null;

  if (file) {
    const filePath = `${user.id}/${Date.now()}-${file.name}`;

    const { error: uploadError } = await supabaseClient.storage
      .from('profile-pictures')
      .upload(filePath, file);

    if (uploadError) {
      showMessage(uploadError.message);
      return;
    }

    const { data } = supabaseClient.storage
      .from('profile-pictures')
      .getPublicUrl(filePath);

    avatarUrl = data.publicUrl;
  }

  const usernameBase = user.email
    ? user.email.split('@')[0]
    : `user-${user.id.slice(0, 6)}`;

  const finalNickname =
    nickname || currentProfile?.nickname || usernameBase;

  const { data: savedProfile, error } = await supabaseClient
    .from('profiles')
    .upsert({
      id: user.id,
      username: currentProfile?.username || usernameBase,
      nickname: finalNickname,
      avatar_url: avatarUrl
    })
    .select()
    .single();

  if (error) {
    console.error(error);
    showMessage(error.message);
    return;
  }

  currentProfile = savedProfile;

  posts = posts.map((post) =>
    post.userId === user.id
      ? {
          ...post,
          nickname: currentProfile.nickname,
          avatarUrl: currentProfile.avatar_url || ''
        }
      : post
  );

  renderTimeline();
  profilePopup.classList.remove('open');
  pfpInput.value = '';

  showMessage('updated! <3');
}

async function loadPosts() {
  const [
    { data: postsData, error: postsError },
    { data: commentsData, error: commentsError },
    { data: stickersData, error: stickersError }
  ] = await Promise.all([
    supabaseClient
      .from('posts')
      .select(`
        id,
        content,
        created_at,
        user_id,
        profiles (
          nickname,
          avatar_url,
          username
        )
      `)
      .order('created_at', { ascending: false }),
    supabaseClient
      .from('comments')
      .select(`
        id,
        post_id,
        user_id,
        content,
        created_at,
        parent_comment_id,
        profiles (
          nickname,
          username
        )
      `)
      .order('created_at', { ascending: true }),
    supabaseClient
      .from('post_stickers')
      .select('id, post_id, user_id, emoji, x, y')
  ]);

  if (postsError) {
    console.error(postsError);
    showMessage(postsError.message);
    return;
  }

  if (commentsError) {
    console.error(commentsError);
    showMessage(commentsError.message);
    return;
  }

  if (stickersError) {
    console.error(stickersError);
    showMessage(stickersError.message);
    return;
  }

  let { data: likesData, error: likesError } = await supabaseClient
    .from('likes')
    .select('id, post_id, comment_id, user_id');

  if (likesError) {
    commentLikesEnabled = false;

    const fallbackLikes = await supabaseClient
      .from('likes')
      .select('id, post_id, user_id');

    likesData = fallbackLikes.data;
    likesError = fallbackLikes.error;
  } else {
    commentLikesEnabled = true;
  }

  if (likesError) {
    console.error(likesError);
    showMessage(likesError.message);
    return;
  }

  const likesByPostId = new Map();
  const likesByCommentId = new Map();
  const commentsByPostId = new Map();
  const repliesByParentId = new Map();

  (likesData || []).forEach((like) => {
    if (like.post_id) {
      const postLikes = likesByPostId.get(like.post_id) || [];
      postLikes.push(like);
      likesByPostId.set(like.post_id, postLikes);
    }

    if (like.comment_id) {
      const commentLikes = likesByCommentId.get(like.comment_id) || [];
      commentLikes.push(like);
      likesByCommentId.set(like.comment_id, commentLikes);
    }
  });

  const normalizedComments = (commentsData || []).map((comment) => ({
    id: comment.id,
    post_id: comment.post_id,
    userId: comment.user_id,
    text: comment.content,
    created_at: comment.created_at,
    parent_comment_id: comment.parent_comment_id,
    nickname: comment.profiles?.nickname || comment.profiles?.username || 'memory',
    likesCount: (likesByCommentId.get(comment.id) || []).length,
    likedByMe: (likesByCommentId.get(comment.id) || []).some(
      (like) => like.user_id === currentProfile?.id
    )
  }));

  normalizedComments.forEach((comment) => {
    const commentsForPost = commentsByPostId.get(comment.post_id) || [];
    commentsForPost.push(comment);
    commentsByPostId.set(comment.post_id, commentsForPost);

    if (comment.parent_comment_id) {
      const replies = repliesByParentId.get(comment.parent_comment_id) || [];
      replies.push(comment);
      repliesByParentId.set(comment.parent_comment_id, replies);
    }
  });

  posts = (postsData || []).map((row) => {
    const postLikes = likesByPostId.get(row.id) || [];
    const allPostComments = commentsByPostId.get(row.id) || [];

    const topLevelComments = allPostComments
      .filter((comment) => !comment.parent_comment_id)
      .map((comment) => ({
        ...comment,
        replies: repliesByParentId.get(comment.id) || []
      }));

    return {
      id: row.id,
      userId: row.user_id,
      text: row.content,
      created_at: row.created_at,
      author: row.user_id === currentProfile?.id ? 'posted by you' : 'posted by them',
      nickname: row.profiles?.nickname || row.profiles?.username || 'memory',
      avatarUrl: row.profiles?.avatar_url || '',
      likesCount: postLikes.length,
      likedByMe: postLikes.some((like) => like.user_id === currentProfile?.id),
      comments: topLevelComments
    };
  });

  placedStickers = (stickersData || []).map((row) => ({
    id: row.id,
    postId: row.post_id,
    userId: row.user_id,
    sticker: row.emoji,
    x: row.x,
    y: row.y
  }));

  renderTimeline();
}

async function toggleCommentLike(commentId) {
  const user = await getCurrentUser();

  if (!user) {
    showMessage('please log in first ♡');
    return;
  }

  const post = posts.find((item) => item.id === currentCommentsPostId);
  if (!post) return;

  const allComments = [
    ...(post.comments || []),
    ...(post.comments || []).flatMap((comment) => comment.replies || [])
  ];
  const comment = allComments.find((item) => item.id === commentId);

  if (!comment) return;

  if (!commentLikesEnabled) {
    showMessage('comment likes need a comment_id column in your likes table ♡');
    return;
  }

  if (comment.likedByMe) {
    const { error } = await supabaseClient
      .from('likes')
      .delete()
      .eq('comment_id', commentId)
      .eq('user_id', user.id);

    if (error) {
      console.error(error);
      showMessage(error.message);
      return;
    }
  } else {
    const { error } = await supabaseClient
      .from('likes')
      .insert({
        comment_id: commentId,
        user_id: user.id
      });

    if (error) {
      console.error(error);
      showMessage(error.message);
      return;
    }
  }

  await loadPosts();
  renderCommentsList(currentCommentsPostId);
}

function openCommentsPopup(postId) {
  currentCommentsPostId = postId;
  replyingToCommentId = null;
  replyingToLabel.style.display = 'none';
  replyingToLabel.textContent = '';
  commentInput.value = '';
  renderCommentsList(postId);
  commentsPopup.classList.add('open');
}

function renderCommentsList(postId) {
  const post = posts.find((item) => item.id === postId);

  if (!post || !post.comments || !post.comments.length) {
    commentsList.innerHTML = `<div class="comment-empty">no comments yet ♡</div>`;
    return;
  }

  commentsList.innerHTML = post.comments.map((comment) => {
    const repliesHtml = (comment.replies || []).map((reply) => {
      return `
        <div class="comment-reply" data-comment-id="${reply.id}">
          <div class="comment-name">${reply.nickname || 'memory'}</div>
          <div class="comment-text">${reply.text}</div>

          <div class="comment-actions">
            <button class="comment-like-btn" type="button" data-comment-id="${reply.id}">
              ${reply.likedByMe ? '🩷 liked' : '♡ like'} (${reply.likesCount || 0})
            </button>
            ${reply.userId === currentProfile?.id ? `
              <button class="delete-reply-btn" type="button" data-comment-id="${reply.id}">
                delete
              </button>
            ` : ''}
          </div>
        </div>
      `;
    }).join('');

    return `
      <div class="comment-item" data-comment-id="${comment.id}">
        <div class="comment-name">${comment.nickname || 'memory'}</div>
        <div class="comment-text">${comment.text}</div>

        <div class="comment-actions">
          <button class="comment-like-btn" type="button" data-comment-id="${comment.id}">
            ${comment.likedByMe ? '🩷 liked' : '♡ like'} (${comment.likesCount || 0})
          </button>
          <button class="reply-btn" type="button" data-comment-id="${comment.id}">
            reply
          </button>

          ${comment.userId === currentProfile?.id ? `
            <button class="delete-comment-btn" type="button" data-comment-id="${comment.id}">
              delete
            </button>
          ` : ''}
        </div>

        ${repliesHtml}
      </div>
    `;
  }).join('');

  document.querySelectorAll('.reply-btn').forEach((btn) => {
    btn.addEventListener('click', () => {
      replyingToCommentId = btn.dataset.commentId;
      replyingToLabel.style.display = 'block';
      replyingToLabel.textContent = 'replying to a comment ♡';
      commentInput.focus();
    });
  });

  document.querySelectorAll('.comment-like-btn').forEach((btn) => {
    btn.addEventListener('click', async () => {
      await toggleCommentLike(btn.dataset.commentId);
    });
  });

  document.querySelectorAll('.delete-comment-btn').forEach((btn) => {
    btn.addEventListener('click', async () => {
      await deleteComment(btn.dataset.commentId);
    });
  });

  document.querySelectorAll('.delete-reply-btn').forEach((btn) => {
    btn.addEventListener('click', async () => {
      await deleteComment(btn.dataset.commentId);
    });
  });
}

async function saveComment() {
  const content = commentInput.value.trim();

  if (!content || !currentCommentsPostId) {
    showMessage('write something first silly! ♡');
    return;
  }

  const user = await getCurrentUser();

  if (!user) {
    showMessage('log in first silly! ♡');
    return;
  }

  const { error } = await supabaseClient
    .from('comments')
    .insert({
      post_id: currentCommentsPostId,
      user_id: user.id,
      content,
      parent_comment_id: replyingToCommentId
    });

  if (error) {
    console.error(error);
    showMessage(error.message);
    return;
  }

  commentInput.value = '';
  replyingToCommentId = null;
  replyingToLabel.style.display = 'none';

  await loadPosts();

  showMessage('comment posted! ♡');
}

async function deleteComment(commentId) {
  const el = document.querySelector(`[data-comment-id="${commentId}"]`);

  if (el) {
    el.style.transition = 'opacity 0.35s ease, transform 0.35s ease';
    el.style.opacity = '0';
    el.style.transform = 'translateY(6px) scale(0.98)';
  }

  setTimeout(async () => {
    const { error } = await supabaseClient
      .from('comments')
      .delete()
      .eq('id', commentId);

    if (error) {
      console.error(error);
      showMessage(error.message);
      await loadPosts();
      return;
    }

    showMessage('comment deleted ♡');
    await loadPosts();
    renderCommentsList(currentCommentsPostId);
  }, 250);
}

async function logoutUser() {
  const { error } = await supabaseClient.auth.signOut();

  if (error) {
    showMessage(error.message);
    return;
  }

  currentProfile = null;
  setCurrentUser(null);
  profilePopup.classList.remove('open');
  authPopup.classList.add('open');

  emailInput.value = '';
  passwordInput.value = '';
  nicknameInput.value = '';
  pfpInput.value = '';

  personalStickers = [];
renderStickerGrid();

placedStickers = [];
renderPlacedStickers();

  showMessage('logged out ♡');
}

async function checkSession() {
  const {
    data: { session }
  } = await supabaseClient.auth.getSession();

  if (session?.user) {
    setCurrentUser(session.user);
    authPopup.classList.remove('open');
    await loadProfile(session.user);
    await refreshUserData({ includeWidgets: true });
  } else {
    setCurrentUser(null);
    authPopup.classList.add('open');
    posts = [];
    personalStickers = [];
    renderTimeline();
    renderWidgets();
  }
}
