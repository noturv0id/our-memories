<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="our memories" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#fff8fb" />
    <link rel="icon" type="image/png" sizes="853x853" href="./icon.png" />
    <link rel="shortcut icon" href="./icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./icon.png" />
    <link rel="manifest" href="./site.webmanifest" />
    <title>TOTO & DODO</title>
    <script>
      (() => {
        try {
          const savedTheme = localStorage.getItem('ourMemoriesTheme');
          const prefersDark = window.matchMedia?.('(prefers-color-scheme: dark)').matches;
          document.documentElement.dataset.theme = savedTheme || (prefersDark ? 'dark' : 'light');
        } catch {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Noto+Sans:wght@400;500;600;700&family=Noto+Sans+Batak&family=Noto+Sans+Symbols+2&family=Quicksand:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css?v=20260426-41" />
  </head>
  <body class="app-booting">
    <div class="launch-splash" id="launchSplash" aria-hidden="true">
      <img class="launch-splash-image" src="./launching.jpeg" alt="" />
    </div>
    <div class="page">
      <div class="floating-decor" id="floatingDecor"></div>

      <header class="toolbar" id="appToolbar" data-auth-state="checking">
        <div class="toolbar-inner toolbar-live">
          <div class="brand">
            <div class="brand-icons"><span>♡</span><span>✦</span><span>🎀</span></div>
            <div class="site-title">our memories ♡</div>
          </div>

          <div class="quote-pill">⊹˚₊ forever and always ₊˚⊹</div>

          <div class="toolbar-actions">
            <div class="notifications-menu" id="notificationsMenu">
              <button
                class="notifications-btn"
                type="button"
                id="notificationsBtn"
                aria-label="open inbox"
                aria-expanded="false"
              >
                <span class="notifications-btn-icon" aria-hidden="true">🕭</span>
                <span class="notifications-btn-label">inbox</span>
                <span class="notifications-badge" id="notificationsBadge" hidden>0</span>
              </button>
              <div class="notifications-panel" id="notificationsPanel" hidden>
                <div class="notifications-panel-header">
                  <h3 class="notifications-title">inbox ♡</h3>
                  <div class="notifications-panel-actions">
                    <button class="notifications-mark-btn" id="markAllReadBtn" type="button">mark all read</button>
                    <button class="notifications-mark-btn" id="clearNotificationsBtn" type="button">clear notifications</button>
                  </div>
                </div>
                <div class="notifications-list" id="notificationsList"></div>
              </div>
            </div>
            <button
              class="theme-toggle"
              type="button"
              id="themeToggle"
              aria-label="switch to dark mode"
              aria-pressed="false"
            >
              <span class="theme-toggle-icon" aria-hidden="true">☾</span>
            </button>
            <button class="soft-btn" type="button" id="toggleWidgetsBtn" aria-pressed="false">widgets</button>
            <button class="soft-btn" type="button" id="profileBtn">profile</button>
          </div>
        </div>
        <div class="toolbar-inner toolbar-skeleton" aria-hidden="true">
          <div class="toolbar-skeleton-brand">
            <span class="skeleton-avatar toolbar-skeleton-icon"></span>
            <span class="skeleton-line toolbar-skeleton-title"></span>
          </div>
          <span class="skeleton-block toolbar-skeleton-quote"></span>
          <div class="toolbar-skeleton-actions">
            <span class="skeleton-button toolbar-skeleton-btn toolbar-skeleton-btn-inbox"></span>
            <span class="skeleton-button toolbar-skeleton-btn toolbar-skeleton-btn-toggle"></span>
            <span class="skeleton-button toolbar-skeleton-btn"></span>
            <span class="skeleton-button toolbar-skeleton-btn"></span>
          </div>
        </div>
      </header>

      <div class="mobile-view-switcher" id="mobileViewSwitcher" hidden>
        <button class="mobile-view-btn" type="button" data-mobile-view="left" aria-pressed="false">
          left side
        </button>
        <button class="mobile-view-btn active" type="button" data-mobile-view="timeline" aria-pressed="true">
          entries
        </button>
        <button class="mobile-view-btn" type="button" data-mobile-view="right" aria-pressed="false">
          right side
        </button>
      </div>

      <main class="layout">
        <section class="widget-zone" id="leftZone"></section>

        <section class="timeline" id="timeline"></section>

        <section class="widget-zone" id="rightZone"></section>
      </main>
    </div>

    <button class="floating-entry-btn" type="button" id="newEntryBtn" aria-label="create new entry">
      <span class="floating-entry-icon" aria-hidden="true">+</span>
    </button>

    <div class="message" id="messageBox"></div>

    <div class="popup" id="profilePopup">
      <div class="popup-card">
        <div class="popup-header">
          <h3 class="popup-title">my profile ♡</h3>
          <button class="soft-btn" id="closeProfilePopup" type="button">close</button>
        </div>
        <div class="popup-body">
          <label class="popup-label">nickname</label>
          <input class="popup-input" id="nicknameInput" type="text" />
    
          <label class="popup-label" style="margin-top: 12px;">profile picture</label>
          <input class="popup-input" id="pfpInput" type="file" accept="image/*" />
    
          <div class="popup-actions">
            <button class="soft-btn" id="logoutBtn" type="button">log out</button>
            <button class="soft-btn" id="saveProfileBtn" type="button">save</button>
          </div>
        </div>
      </div>
    </div>

    <div class="popup" id="entryPopup">
      <div class="popup-card">
        <div class="popup-header">
          <h3 class="popup-title">new entry ✎</h3>
          <div class="popup-header-actions">
            <button class="soft-btn" id="saveEntryBtn" type="button">post</button>
            <button class="soft-btn" id="closeEntryPopup" type="button">close</button>
          </div>
        </div>
        <div class="popup-body">
          <label class="popup-label">write something ♡</label>
          <div class="entry-editor" id="entryEditor"></div>
          <textarea class="popup-input entry-fallback" id="entryContentFallback" rows="6" style="resize: vertical; min-height: 140px;"></textarea>
          <div class="entry-attachment-fields">
            <label class="popup-label" for="entryImageInput">attach image</label>
            <div class="entry-image-box">
              <input class="popup-input" id="entryImageInput" type="file" accept="image/*" />
              <input id="entryImageData" type="hidden" value="" />
              <div class="entry-image-preview" id="entryImagePreview" hidden></div>
              <button class="soft-btn entry-image-remove-btn" id="removeEntryImageBtn" type="button" hidden>remove image</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="popup" id="commentsPopup">
      <div class="popup-card">
        <div class="popup-header">
          <h3 class="popup-title">comments ♡</h3>
          <button class="soft-btn" id="closeCommentsPopup" type="button">close</button>
        </div>
        <div class="popup-body">
          <div id="commentsList" style="display:flex; flex-direction:column; gap:12px; max-height:260px; overflow:auto; margin-bottom:16px;"></div>
    
          <div id="replyingToLabel" class="small-note" style="display:none;"></div>
          <label class="popup-label">leave a smol note?</label>
          <textarea
            class="popup-input"
            id="commentInput"
            rows="4"
            style="resize: vertical; min-height: 96px;"
          ></textarea>
    
          <div class="popup-actions">
            <button class="soft-btn" id="saveCommentBtn" type="button">post comment</button>
          </div>
        </div>
      </div>
    </div>



    <div class="popup" id="widgetPopup">
      <div class="popup-card">
        <div class="popup-header">
          <h3 class="popup-title" id="widgetPopupTitle">edit widget</h3>
          <div class="popup-header-actions">
            <button class="soft-btn widget-clear-history-btn" id="clearWidgetHistoryBtn" type="button">clear history</button>
            <button class="soft-btn" id="headerSaveWidgetBtn" type="button" hidden>save</button>
            <button class="post-btn like-btn widget-like-btn widget-popup-like-btn" id="widgetPopupLikeBtn" type="button" hidden aria-label="like widget" aria-pressed="false"></button>
            <button class="soft-btn" id="closeWidgetPopup" type="button">close</button>
          </div>
        </div>
        <div class="popup-body">
          <div id="widgetEditorFields"></div>
          <div class="popup-actions">
            <button class="soft-btn" id="saveWidgetBtn" type="button">save</button>
          </div>
        </div>
      </div>
    </div>

    <div class="popup" id="stickerPopup">
      <div class="popup-card">
        <div class="popup-header">
          <h3 class="popup-title">✦ sticker box ♡</h3>
          <div class="popup-header-actions">
            <button class="soft-btn" id="closeStickerPopup" type="button">close</button>
          </div>
        </div>
        <div class="popup-body">
          <div class="sticker-tabs" id="stickerTabs">
            <button class="sticker-tab active" type="button" data-sticker-tab="type">type one</button>
            <button class="sticker-tab" type="button" data-sticker-tab="pick">pick one</button>
            <button class="sticker-tab" type="button" data-sticker-tab="gif">gif library</button>
          </div>

          <div class="sticker-panel active" id="stickerTypePanel">
          <label class="popup-label" for="stickerInput">add a little sticker ♡</label>
          <div class="typed-sticker-input-wrap">
            <input class="popup-input typed-sticker-input" id="stickerInput" maxlength="16" placeholder="" />
            <div class="typed-sticker-preview-wrap" id="typedStickerPreviewWrap" hidden>
              <button class="typed-sticker-preview" id="typedStickerPreview" type="button" draggable="true"></button>
            </div>
          </div>
          </div>

          <div class="sticker-panel" id="stickerPickPanel">
            <label class="popup-label">tap an emoji to use it ♡</label>
            <div class="emoji-picker-grid" id="emojiPickerGrid"></div>
          </div>

          <div class="sticker-panel" id="stickerGifPanel">
            <label class="popup-label">search public gifs ♡</label>
            <div class="gif-search-bar">
              <input
                class="popup-input gif-search-input"
                id="gifSearchInput"
                type="text"
                placeholder="Search GIPHY"
              />
              <button class="soft-btn" id="gifSearchBtn" type="button">search</button>
            </div>
            <div class="small-note" id="gifSearchStatus">search public gifs or pick one below ♡</div>
            <div class="gif-picker-grid" id="gifPickerGrid"></div>
            <div class="gif-attribution">Powered by GIPHY</div>
          </div>

          <div class="small-note">you can drag your stickers from the sticker box onto any diary entry ♡</div>
        </div>
      </div>
    </div>

    <div class="popup open" id="authPopup">
        <div class="popup-card">
          <div class="popup-header">
            <h3 class="popup-title">welcome back ♡</h3>
          </div>
          <div class="popup-body">
            <label class="popup-label">email</label>
            <input class="popup-input" id="emailInput" type="email" />
      
            <label class="popup-label" style="margin-top: 12px;">password</label>
            <div class="password-input-wrap">
              <input class="popup-input" id="passwordInput" type="password" />
              <button
                class="password-toggle-btn"
                id="passwordToggleBtn"
                type="button"
                aria-label="show password"
                aria-pressed="false"
              >
                <span class="password-toggle-icon" aria-hidden="true">◉</span>
              </button>
            </div>
      
            <div class="popup-actions">
              <button class="soft-btn" id="loginBtn">login</button>
            </div>
          </div>
        </div>
      </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js"></script>
    <script src="./script.js?v=20260427-1"></script>
  </body>
</html>
