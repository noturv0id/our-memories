<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Quicksand:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Opening Website</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-1: #160f1b;
        --bg-2: #211527;
        --bg-3: #301c2f;
        --card: rgba(43, 27, 48, 0.9);
        --card-strong: rgba(59, 37, 56, 0.94);
        --border: rgba(138, 82, 114, 0.82);
        --text: #f7e7f1;
        --muted: #c9aabe;
        --accent: #f0b8cb;
        --shadow: 0 24px 60px rgba(5, 2, 8, 0.52);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: var(--text);
        background:
          radial-gradient(circle at 18% 16%, rgba(132, 76, 119, 0.34), transparent 19%),
          radial-gradient(circle at 82% 14%, rgba(92, 58, 115, 0.34), transparent 22%),
          radial-gradient(circle at 50% 62%, rgba(67, 40, 76, 0.56), transparent 30%),
          linear-gradient(180deg, var(--bg-1), var(--bg-2), var(--bg-3));
        font-family: "Quicksand", "Segoe UI", sans-serif;
        overflow: hidden;
      }

      main {
        width: min(90vw, 520px);
        padding: clamp(28px, 6vw, 44px);
        border: 1px solid var(--border);
        border-radius: 34px;
        background:
          linear-gradient(180deg, var(--card-strong), var(--card));
        box-shadow: var(--shadow);
        text-align: center;
        position: relative;
        overflow: hidden;
      }

      main::before,
      main::after {
        content: "";
        position: absolute;
        width: 180px;
        height: 180px;
        border-radius: 999px;
        background: rgba(240, 184, 203, 0.16);
        filter: blur(4px);
        pointer-events: none;
      }

      main::before {
        top: -110px;
        left: -70px;
      }

      main::after {
        right: -90px;
        bottom: -120px;
      }

      .eyebrow {
        position: relative;
        z-index: 1;
        margin: 0 0 12px;
        color: var(--muted);
        font-family: "Fredoka", "Quicksand", sans-serif;
        font-size: 0.9rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        position: relative;
        z-index: 1;
        margin: 0;
        font-family: "Fredoka", "Quicksand", sans-serif;
        font-size: clamp(2.1rem, 8vw, 3.7rem);
        line-height: 1.02;
        text-transform: lowercase;
      }

      p {
        position: relative;
        z-index: 1;
        margin: 14px auto 0;
        max-width: 30rem;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.5;
      }

      .open-now {
        position: relative;
        z-index: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        margin-top: 22px;
        padding: 0 20px;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: rgba(55, 34, 52, 0.9);
        color: var(--text);
        font-weight: 700;
        text-decoration: none;
        box-shadow: 0 12px 28px rgba(5, 2, 8, 0.24);
      }

      .loading-dots {
        position: relative;
        z-index: 1;
        display: inline-flex;
        justify-content: center;
        gap: 8px;
        margin-top: 24px;
      }

      .loading-dots span {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: var(--accent);
        opacity: 0.42;
        animation: dotPulse 1.18s ease-in-out infinite;
      }

      .loading-dots span:nth-child(2) {
        animation-delay: 0.16s;
      }

      .loading-dots span:nth-child(3) {
        animation-delay: 0.32s;
      }

      @keyframes dotPulse {
        0%,
        80%,
        100% {
          opacity: 0.38;
          transform: translateY(0);
        }

        40% {
          opacity: 1;
          transform: translateY(-5px);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">our memories</p>
      <h1>opening website</h1>
      <p>Preparing the anniversary page...</p>
      <div class="loading-dots" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <a class="open-now" id="openNowLink" href="./toto%20%26%20dodo%20anniversary/index.html">open now</a>
    </main>
    <script>
      const anniversaryUrl = new URL("./toto%20%26%20dodo%20anniversary/index.html", window.location.href);
      document.getElementById("openNowLink").href = anniversaryUrl.href;

      window.setTimeout(() => {
        window.location.href = anniversaryUrl.href;
      }, 1400);
    </script>
  </body>
</html>
